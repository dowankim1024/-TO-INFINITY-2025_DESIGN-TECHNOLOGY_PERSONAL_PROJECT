<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>터널 착시 효과</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .center-square {
            display: none; /* 중앙 사각형 숨김 - 파티클로만 처리 */
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            z-index: 10;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <!-- 중앙 영역은 파티클로 처리 -->
        <div class="info">
            터널 착시 효과 - 파티클들이 앞으로 다가오는 무한한 터널
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/tunnel-particles.js"></script>
    <script>
        // 터널 착시 효과 초기화
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('canvas'),
            antialias: true,
            alpha: true
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        
        // 터널 파티클 시스템 생성
        const tunnelParticles = new TunnelParticles(scene, 5000);
        
        // 카메라 위치 설정
        camera.position.z = 0;
        
        // 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            
            tunnelParticles.update();
            
            renderer.render(scene, camera);
        }
        
        // 윈도우 리사이즈 처리
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // 애니메이션 시작
        animate();
    </script>
</body>
</html>
